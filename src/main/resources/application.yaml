spring:
  application:
    name: mboard
  
  web:
    resources:
      static-locations: 
        - "file:./external-static/"
        - "classpath:/static/"
        - "classpath:/public/"

  threads:
    virtual:
      enabled: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  datasource:
    url: jdbc:h2:file:./data/mboard
    driver-class-name: org.h2.Driver
    username: ${DB_ADMIN_USERNAME:admin}
    password: ${DB_ADMIN_PASSWORD:pass}
  
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  
  session:
    store-type: jdbc
    timeout: 1h
    jdbc:
      initialize-schema: always
      table-name: "SESSIONS"

server:
  servlet:
    session:
      cookie:
        name: M_BOARD
        http-only: true
        secure: false